<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signage Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: black; }
        video { width: 100vw; height: 100vh; object-fit: contain; } /* 'cover' fills the screen, 'contain' shows the whole video */
    </style>
    <meta name="robots" content="noindex, nofollow">
</head>
<body>
    <video autoplay muted loop playsinline preload="auto">
        <source src="Slides.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</body>

</html>
